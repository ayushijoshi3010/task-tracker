{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- This link in for adding css file -->

   
    <link rel="stylesheet" href="{% static 'css/style.css' %}" />

    <!-- This link is for fonts -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&display=swap"
    />

    <!-- This link is for icons -->

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <title>Write your Tasks</title>
  </head>
  <body>
    <div class="signup_login">
      <div><h1>👋 Hello {{user}}</h1></div>
      <div class="signup_box">


     <div class="heading_row">
    <h2 class="todo_heading">Get Things Done ..</h2>

    <a href="{% url 'logout_view' %}"
       onclick="return confirm('Are you sure you want to logout?')">
        <i class="fa-solid fa-right-from-bracket logout_icon"></i>
    </a>
</div>



        <form method="post">
          {% csrf_token %}
          <input
            type="text"
            class="inp"
            name="title"
            required
            placeholder="Add Today's Task"
          />
          <input type="submit" class="submit_button" value="Add Task" />
        </form>
      </div>

      <div class="Todo">
        <table>
          <thead>
            <tr>
              <td>Sr.No</td>
              <td>Title</td>
              <td>Edit</td>
              <td>Delete</td>
            </tr>
          </thead>
          <tbody>
            {% for todo in res %}
            <tr>
              <td>{{ forloop.counter }}</td>
              <td>{{todo.title}}</td>
              <td>
                <a href="{% url 'todo_edit' todo.srno %}"
                  ><i class="fa-solid fa-pen-to-square"></i
                ></a>
              </td>
              <td>
                <a href="{% url 'todo_delete' todo.srno %}"
                  ><i class="fa-solid fa-trash"></i
                ></a>
              </td>
            </tr>

            {% empty %}
            <tr>
              <td colspan="4">
                <b>No Task has been added</b>
              </td>
            </tr>

            {% endfor %}
          </tbody>
        </table>
      </div>
    </div>
    <br /><br />
    <hr />
    <hr />
  </body>
</html>
