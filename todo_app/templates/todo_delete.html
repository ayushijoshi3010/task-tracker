{% load static %}

<!DOCTYPE html>
<html>
<head>
    <title>Delete Todo</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}" />
    <link rel="stylesheet" href="{% static 'css/index.css' %}" />

</head>
<body>

<div class="signup_box">

    <h2>Delete Todo</h2>

    <p>
        Are you sure you want to delete
        <b>{{ todo.title }}</b> ?
    </p>

    <form method="post">
        {% csrf_token %}

        <button type="submit">
            Yes, Delete
        </button>

        <a href="/todo_app">
            Cancel
        </a>
    </form>

</div>

</body>
</html>
